name: DCO Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  dco:
    name: DCO Sign-off
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check DCO sign-off
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          FAILED=0
          while IFS= read -r sha; do
            if ! git log -1 --format='%B' "$sha" | grep -qi '^Signed-off-by:'; then
              echo "::error::Commit $sha is missing Signed-off-by line"
              FAILED=1
            fi
          done < <(git rev-list "$BASE_SHA".."$HEAD_SHA")
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "All commits must include a Signed-off-by line."
            echo "Use: git commit -s"
            echo "To fix the last commit: git commit --amend -s"
            exit 1
          fi
          echo "All commits have DCO sign-off."
