name: CI Image

on:
  push:
    branches: [main]
    paths:
      - 'ci/Containerfile'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/*/Cargo.toml'
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'  # Weekly Monday 4am UTC

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/lobstertrap/puzzlepod/ci

jobs:
  build-push:
    name: Build & Push CI Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci/Containerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:fedora42
