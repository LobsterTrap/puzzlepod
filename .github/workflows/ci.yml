name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'man/**'
      - 'skills/**'
      - '.claude/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'man/**'
      - 'skills/**'
      - '.claude/**'
  workflow_dispatch:
  workflow_run:
    workflows: ["Agent Dispatch"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CI_IMAGE: ghcr.io/lobstertrap/puzzlepod/ci:fedora42

jobs:
  # ---------------------------------------------------------------------------
  # Resolve the ref to check out (handles workflow_run from Agent Dispatch)
  # ---------------------------------------------------------------------------
  resolve-ref:
    name: Resolve Ref
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.ref.outputs.ref }}
    steps:
      - name: Download branch ref from Agent Dispatch
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: agent-branch
          path: /tmp
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Determine checkout ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            if [ -f /tmp/agent-branch.txt ]; then
              BRANCH=$(cat /tmp/agent-branch.txt)
              echo "ref=$BRANCH" >> $GITHUB_OUTPUT
              echo "::notice::Running CI on agent branch: $BRANCH"
            else
              echo "::notice::No agent-branch artifact found, skipping"
              echo "ref=" >> $GITHUB_OUTPUT
            fi
          else
            echo "ref=" >> $GITHUB_OUTPUT
          fi

  # ---------------------------------------------------------------------------
  # CI: license headers + fmt + clippy + unit tests + feature matrix + cargo-deny
  # ---------------------------------------------------------------------------
  ci:
    name: Build & Test
    needs: [resolve-ref]
    if: |
      always() &&
      (github.event_name != 'workflow_run' || needs.resolve-ref.outputs.ref != '')
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.CI_IMAGE || 'ghcr.io/lobstertrap/puzzlepod/ci:fedora42' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: "Suite 0/5 — License Headers"
        run: |
          chmod +x scripts/check-license-headers.sh
          scripts/check-license-headers.sh

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            target/
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: "Suite 1/5 — Formatting"
        run: cargo fmt --all -- --check

      - name: "Suite 2/5 — Clippy Lint"
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: "Suite 3/5 — Unit Tests"
        run: |
          cargo test -p puzzled --lib
          cargo test -p puzzled \
            --test dbus_validation --test diff_engine --test crash_recovery \
            --test ima_integration --test phase2_features --test policy_evaluation \
            --test profile_validation --test seccomp_validation --test security_hardening \
            --test wal_recovery_execution --test wal_recovery --test wal_safety \
            --test podman_native_integration --test cross_module_integration
          cargo test -p puzzlectl
          cargo test -p puzzled-types
          cargo test -p puzzle-proxy
          cargo test -p puzzle-hook
          cargo test -p puzzle-init

      - name: "Suite 4/5 — Feature Flag Matrix"
        run: |
          cargo check -p puzzlectl --no-default-features
          cargo check -p puzzlectl --no-default-features --features tui
          cargo check -p puzzlectl --no-default-features --features sim

      - name: "Suite 5/5 — Dependency Audit"
        run: |
          cargo-deny check advisories
          cargo-deny check licenses
          cargo-deny check sources
          cargo-deny check bans || echo "cargo-deny bans warnings (non-blocking)"

  # ---------------------------------------------------------------------------
  # Integration: D-Bus integration tests against a live puzzled
  # ---------------------------------------------------------------------------
  integration:
    name: D-Bus Integration
    needs: [resolve-ref, ci]
    if: always() && needs.ci.result == 'success'
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.CI_IMAGE || 'ghcr.io/lobstertrap/puzzlepod/ci:fedora42' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            target/
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Run D-Bus integration tests
        run: |
          set -euo pipefail

          # Create required directories
          mkdir -p /run/dbus /var/lib/puzzled/branches/wal /run/puzzled /etc/puzzled/profiles /etc/puzzled/policies /etc/dbus-1/system.d

          # Install D-Bus policy
          cat > /etc/dbus-1/system.d/org.lobstertrap.PuzzlePod1.conf << 'DBUS'
          <!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
           "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
          <busconfig>
            <policy user="root">
              <allow own="org.lobstertrap.PuzzlePod1"/>
              <allow send_destination="org.lobstertrap.PuzzlePod1"/>
              <allow receive_sender="org.lobstertrap.PuzzlePod1"/>
            </policy>
            <policy context="default">
              <allow send_destination="org.lobstertrap.PuzzlePod1"/>
              <allow receive_sender="org.lobstertrap.PuzzlePod1"/>
            </policy>
          </busconfig>
          DBUS

          # Start D-Bus system bus
          export DBUS_SYSTEM_BUS_ADDRESS="unix:path=/run/dbus/system_bus_socket"
          dbus-daemon --config-file=/usr/share/dbus-1/system.conf --fork --print-pid --address="$DBUS_SYSTEM_BUS_ADDRESS" 2>&1 || {
            echo "dbus-daemon --system failed, trying manual start..."
            dbus-daemon --fork --print-pid --address="$DBUS_SYSTEM_BUS_ADDRESS" --auth=EXTERNAL 2>&1 || true
          }
          sleep 1

          # Install profiles and policies
          cp policies/profiles/*.yaml /etc/puzzled/profiles/ 2>/dev/null || true
          cp policies/rules/*.rego /etc/puzzled/policies/ 2>/dev/null || true

          # Write minimal puzzled config
          cat > /etc/puzzled/puzzled.conf << 'CONF'
          branch_root: /var/lib/puzzled/branches
          profiles_dir: /etc/puzzled/profiles
          policies_dir: /etc/puzzled/policies
          runtime_dir: /run/puzzled
          bus_type: system
          fs_type: ext4
          max_branches: 64
          log_level: warn
          watchdog_timeout_secs: 0
          commit_timeout_seconds: 300
          default_action: rollback
          default_profile: restricted
          require_human_approval: false
          require_policies: false
          require_ima: false
          require_self_hardening: false
          governance:
            evaluation_timeout_ms: 5000
            require_signature: false
          fanotify:
            enable: false
          bpf_lsm:
            enable: false
          CONF

          # Build puzzled
          echo "=== Building puzzled ==="
          cargo build -p puzzled

          # Start puzzled in background
          echo "=== Starting puzzled ==="
          RUST_LOG=puzzled=warn ./target/debug/puzzled &
          PUZZLED_PID=$!

          # Wait for D-Bus registration (up to 10 seconds)
          for i in $(seq 1 20); do
            if dbus-send --system --dest=org.lobstertrap.PuzzlePod1 --print-reply /org/lobstertrap/PuzzlePod1/Manager org.lobstertrap.PuzzlePod1.Manager.ListBranches >/dev/null 2>&1; then
              echo "puzzled registered on D-Bus (PID $PUZZLED_PID)"
              break
            fi
            sleep 0.5
          done

          if ! dbus-send --system --dest=org.lobstertrap.PuzzlePod1 --print-reply /org/lobstertrap/PuzzlePod1/Manager org.lobstertrap.PuzzlePod1.Manager.ListBranches >/dev/null 2>&1; then
            echo "ERROR: puzzled failed to register on D-Bus within 10s"
            kill $PUZZLED_PID 2>/dev/null || true
            exit 1
          fi

          # Run live D-Bus integration tests
          echo "=== Suite — Live D-Bus Integration (26 tests) ==="
          set +e
          cargo test -p puzzled --test live_dbus_integration -- --test-threads=1
          TEST_RESULT=$?
          set -e

          # Stop puzzled
          kill $PUZZLED_PID 2>/dev/null || true
          wait $PUZZLED_PID 2>/dev/null || true
          echo "puzzled stopped"

          exit $TEST_RESULT

  # ---------------------------------------------------------------------------
  # Security tests (privileged self-hosted runner, manual only)
  # ---------------------------------------------------------------------------
  security-test:
    name: Security Tests
    needs: [resolve-ref]
    if: always() && github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, privileged]
    continue-on-error: true
    container:
      image: ${{ vars.CI_IMAGE || 'ghcr.io/lobstertrap/puzzlepod/ci:fedora42' }}
      options: --privileged
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: "Suite 1/3 — Cargo Integration Tests (root + Linux)"
        run: |
          cargo build --workspace
          cargo test -p puzzled \
            --test branch_lifecycle --test concurrent_branches --test sandbox_containment \
            --test e2e_adversarial --test e2e_scenarios --test crash_recovery \
            --test fanotify_monitoring --test bpf_lsm_hooks --test rogue_agent \
            --test seccomp_notif_handler \
            --test dbus_validation --test diff_engine --test ima_integration \
            --test phase2_features --test policy_evaluation --test profile_validation \
            --test seccomp_validation --test security_hardening \
            --test wal_recovery_execution --test wal_recovery --test wal_safety \
            --test e2e_governance_lifecycle \
            -- --include-ignored --test-threads=1
          cargo test -p puzzlectl -- --include-ignored --test-threads=1
          cargo test -p puzzled-types -- --include-ignored --test-threads=1

      - name: "Suite 2/3 — Security Shell Tests"
        run: |
          chmod +x tests/security/*.sh
          tests/security/run_all.sh

      - name: "Suite 3/3 — Rogue Agent (sandboxed)"
        run: |
          SECURITY_TEST_DIR=$(mktemp -d /tmp/security-tests.XXXXXX)
          cp tests/security/test_rogue_agent.sh "$SECURITY_TEST_DIR/"
          cp tests/security/helpers.sh "$SECURITY_TEST_DIR/"
          ./target/debug/puzzle-sandbox-demo exec --allow-read "$SECURITY_TEST_DIR" -- bash "$SECURITY_TEST_DIR/test_rogue_agent.sh"

  # ---------------------------------------------------------------------------
  # RPM build validation (mock, all targets)
  # ---------------------------------------------------------------------------
  rpm-build:
    name: RPM Build (${{ matrix.mock_root }})
    needs: [ci]
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.CI_IMAGE || 'ghcr.io/lobstertrap/puzzlepod/ci:fedora42' }}
      options: --privileged
    strategy:
      fail-fast: false
      matrix:
        include:
          - mock_root: fedora-42-x86_64
          - mock_root: fedora-43-x86_64
          - mock_root: centos-stream+epel-10-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Build SRPMs
        run: packaging/build-srpm.sh

      - name: Build RPMs with mock
        run: |
          shopt -s nullglob
          mkdir -p packaging/rpms
          for srpm in packaging/srpms/*.src.rpm; do
            echo "--- mock: $srpm ---"
            mock -r ${{ matrix.mock_root }} --enable-network --isolation=simple \
              --rebuild "$srpm" --resultdir=packaging/rpms/ || {
              echo "FAILED: $srpm"
              cat packaging/rpms/build.log 2>/dev/null || true
              exit 1
            }
          done

      - name: Upload RPMs
        uses: actions/upload-artifact@v4
        with:
          name: rpms-${{ matrix.mock_root }}
          path: |
            packaging/rpms/*.rpm
            !packaging/rpms/*.src.rpm
          retention-days: 7

  # ---------------------------------------------------------------------------
  # RPM build validation — aarch64 (QEMU emulation, all targets)
  # ---------------------------------------------------------------------------
  rpm-build-aarch64:
    name: RPM Build (${{ matrix.mock_root }})
    needs: [ci]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - mock_root: fedora-42-aarch64
          - mock_root: fedora-43-aarch64
          - mock_root: centos-stream+epel-10-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Build SRPMs and RPMs (aarch64 QEMU)
        uses: uraimo/run-on-arch-action@v3
        with:
          arch: aarch64
          distro: fedora_latest
          githubToken: ${{ github.token }}
          dockerRunArgs: |
            --privileged
            --volume "${{ github.workspace }}:/work"
          install: |
            dnf install -y --setopt=install_weak_deps=False \
              mock rpm-build rpmdevtools git
            usermod -a -G mock root
          run: |
            cd /work
            packaging/build-srpm.sh
            shopt -s nullglob
            mkdir -p packaging/rpms
            for srpm in packaging/srpms/*.src.rpm; do
              echo "--- mock: $srpm ---"
              mock -r ${{ matrix.mock_root }} --enable-network --isolation=simple \
                --rebuild "$srpm" --resultdir=packaging/rpms/ || {
                echo "FAILED: $srpm"
                cat packaging/rpms/build.log 2>/dev/null || true
                exit 1
              }
            done

      - name: Upload RPMs
        uses: actions/upload-artifact@v4
        with:
          name: rpms-${{ matrix.mock_root }}
          path: |
            packaging/rpms/*.rpm
            !packaging/rpms/*.src.rpm
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Release build + RPM spec validation
  # ---------------------------------------------------------------------------
  release:
    name: Release Build
    needs: [resolve-ref, ci]
    if: always() && needs.ci.result == 'success' && github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.CI_IMAGE || 'ghcr.io/lobstertrap/puzzlepod/ci:fedora42' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Build release binaries
        run: cargo build --workspace --profile release

      - name: Validate RPM specs
        run: |
          rpmdev-setuptree
          for spec in packaging/*.spec; do
            echo "Validating $spec..."
            rpmspec -P "$spec" --define "commit test123" --define "shortcommit test" --define "commitdate 20260309" >/dev/null
          done
          echo "RPM spec validation passed"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: puzzlepod-release
          path: |
            target/release/puzzled
            target/release/puzzlectl
            target/release/puzzle-sandbox-demo
            target/release/puzzle-phase2-demo
          retention-days: 7
