name: Container Build

on:
  workflow_call:
    inputs:
      image-tag:
        description: 'Image tag (typically commit SHA or version)'
        required: true
        type: string
      push:
        description: 'Push to registry'
        required: false
        type: boolean
        default: true
      platform:
        description: 'Target platform'
        required: false
        type: string
        default: 'linux/amd64'
    secrets:
      GITHUB_TOKEN:
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/lobstertrap/puzzlepod/puzzlepod

jobs:
  build:
    name: Build Container Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ inputs.push }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ inputs.image-tag }}
          platforms: ${{ inputs.platform }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
