name: Auto Tag

on:
  schedule:
    - cron: '0 14 * * 1-5'  # 2pm UTC weekdays
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: release-auto-tag
  cancel-in-progress: false

jobs:
  create-tag:
    name: Auto Patch Bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new commits and create tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find latest semver tag
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          if [ -z "$LATEST_TAG" ]; then
            echo "No existing semver tags found — creating v0.1.0"
            NEW_TAG="v0.1.0"
          else
            # Check for new commits since last tag
            COMMITS=$(git rev-list "${LATEST_TAG}..HEAD" --count)
            if [ "$COMMITS" -eq 0 ]; then
              echo "No new commits since $LATEST_TAG — skipping"
              exit 0
            fi
            echo "Found $COMMITS new commits since $LATEST_TAG"

            # Bump patch version
            MAJOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f2)
            PATCH=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f3)
            NEW_PATCH=$((PATCH + 1))
            NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          fi

          # Verify tag does not already exist
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists — skipping"
            exit 0
          fi

          echo "Creating tag $NEW_TAG"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

          # Trigger release workflow
          gh workflow run release-tag.yml --field tag="$NEW_TAG"
