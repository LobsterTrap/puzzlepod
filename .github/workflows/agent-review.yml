name: Agent Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  agent-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    # Only run if GCP is configured
    if: vars.GCP_PROJECT_ID != ''
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Fetch PR diff and context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get PR diff
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr_diff.txt

          # Get PR description
          gh pr view ${{ github.event.pull_request.number }} --json title,body --jq '"\(.title)\n\n\(.body)"' > /tmp/pr_desc.txt

          # Get linked issue if referenced
          ISSUE_NUM=$(gh pr view ${{ github.event.pull_request.number }} --json body --jq '.body' | grep -oP '#\K[0-9]+' | head -1 || echo "")
          if [ -n "$ISSUE_NUM" ]; then
            gh issue view "$ISSUE_NUM" --json title,body --jq '"\(.title)\n\n\(.body)"' > /tmp/issue_context.txt 2>/dev/null || echo "No linked issue found" > /tmp/issue_context.txt
          else
            echo "No linked issue found" > /tmp/issue_context.txt
          fi

          # Truncate diff if too large (keep first 8000 chars)
          if [ $(wc -c < /tmp/pr_diff.txt) -gt 8000 ]; then
            head -c 8000 /tmp/pr_diff.txt > /tmp/pr_diff_truncated.txt
            echo -e "\n\n[... diff truncated for review ...]" >> /tmp/pr_diff_truncated.txt
            mv /tmp/pr_diff_truncated.txt /tmp/pr_diff.txt
          fi

      - name: Request AI review from Vertex AI
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION || 'us-east5' }}
        run: |
          PR_DIFF=$(cat /tmp/pr_diff.txt | jq -Rs .)
          PR_DESC=$(cat /tmp/pr_desc.txt | jq -Rs .)
          ISSUE_CTX=$(cat /tmp/issue_context.txt | jq -Rs .)
          AGENTS_MD=$(cat AGENTS.md | head -100 | jq -Rs .)

          cat > /tmp/request.json <<REQEOF
          {
            "anthropic_version": "vertex-2023-10-16",
            "max_tokens": 4096,
            "messages": [
              {
                "role": "user",
                "content": "You are reviewing a pull request for PuzzlePod, a Rust governance daemon for AI agent containers on Linux. Review the following PR diff against the project conventions and the linked issue's acceptance criteria.\n\nProject conventions (from AGENTS.md):\n${AGENTS_MD}\n\nPR Description:\n${PR_DESC}\n\nLinked Issue:\n${ISSUE_CTX}\n\nDiff:\n${PR_DIFF}\n\nProvide a structured review with:\n1. Summary (2-3 sentences)\n2. Findings ordered by severity (Critical/High/Medium/Low)\n3. Each finding: severity, file:line, issue, suggestion\n4. Overall verdict: APPROVE / REQUEST_CHANGES / COMMENT\n\nFocus on: correctness, security (sandbox escape, privilege escalation), D-Bus idempotency, error handling, test coverage, and adherence to project conventions. Do NOT nitpick style — clippy handles that."
              }
            ]
          }
          REQEOF

          RESPONSE=$(curl -s -X POST \
            "https://${GCP_REGION}-aiplatform.googleapis.com/v1/projects/${GCP_PROJECT_ID}/locations/${GCP_REGION}/publishers/anthropic/models/claude-sonnet-4-20250514:rawPredict" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d @/tmp/request.json)

          # Extract the review text
          echo "$RESPONSE" | jq -r '.content[0].text // "Review generation failed"' > /tmp/review.txt

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REVIEW=$(cat /tmp/review.txt)
          BODY="$(cat <<EOF
          ## AI Code Review

          > **Agent Review** | Automated
          > *Model:* Claude Sonnet (Vertex AI) | *Triggered by:* PR update
          > *This review is advisory — human approval is still required*

          ${REVIEW}

          ---
          *This review was generated by an AI agent via Vertex AI. See [AI Policy](docs/AI_POLICY.md) for details.*
          EOF
          )"

          # Find and update existing comment or create new
          EXISTING=$(gh pr view ${{ github.event.pull_request.number }} --json comments --jq '.comments[] | select(.body | contains("## AI Code Review")) | .id' | head -1)
          if [ -n "$EXISTING" ]; then
            gh api repos/${{ github.repository }}/issues/comments/$EXISTING -X PATCH -f body="$BODY"
          else
            gh pr comment ${{ github.event.pull_request.number }} --body "$BODY"
          fi

      - name: Set review status
        if: always()
        run: echo "Agent review completed"
