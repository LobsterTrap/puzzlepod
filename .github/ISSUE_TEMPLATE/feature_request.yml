name: Feature Request
description: Propose a new feature or enhancement
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What is the high-level goal of this feature?
    validations:
      required: true

  - type: textarea
    id: user-story
    attributes:
      label: User Story
      description: "As a [role], I want [capability], so that [benefit]"
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: What must be true for this feature to be considered done?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - puzzled (daemon)
        - puzzlectl (CLI)
        - puzzled-types (shared types)
        - puzzle-proxy
        - puzzle-hook (OCI hook)
        - puzzle-init
        - policies (OPA/Rego)
        - selinux
        - systemd units
        - podman integration
        - documentation
        - CI/CD
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches were considered?
    validations:
      required: false
