# cargo-deny configuration for PuzzlePod dependency auditing.
#
# Run: cargo-deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
# Ignore specific advisories after review
ignore = [
    # paste is unmaintained (RUSTSEC-2024-0436) but is a transitive dep of
    # ratatui v0.29 — we cannot remove it until ratatui drops paste upstream.
    # No security impact; paste is a compile-time proc-macro for token pasting.
    "RUSTSEC-2024-0436",
    # rustls-pemfile is unmaintained (RUSTSEC-2025-0134) — functionality moved
    # into rustls-pki-types. We use it for PEM parsing in puzzle-proxy TLS MITM.
    # No security impact; it's a thin wrapper around rustls-pki-types internals.
    # TODO: Migrate to rustls-pki-types PemObject trait when tokio-rustls updates.
    "RUSTSEC-2025-0134",
    # lru 0.12.5 unsoundness (RUSTSEC-2026-0002) — transitive dep of ratatui v0.29.
    # Fix requires ratatui >= 0.30.0 which is a breaking update.
    # No practical impact: ratatui's LRU cache is used internally for layout caching,
    # not exposed to untrusted input.
    "RUSTSEC-2026-0002",
]

[licenses]
# Allow only these license types
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "MPL-2.0",
    "OpenSSL",
    "CC0-1.0",
    "MIT-0",
    "CDLA-Permissive-2.0",
]

# Clarifications for crates that have non-standard license declarations
[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
# Warn on multiple versions of the same crate (bloat indicator)
multiple-versions = "warn"
# Deny wildcards in dependency specifications
# Q13: Warn on wildcard dependencies to catch imprecise version specs
# U46: Wildcard advisories are reviewed periodically — see SECURITY.md for the triage process
wildcards = "warn"
# Deny specific crates known to be problematic
deny = []

[sources]
# Only allow crates from crates.io
unknown-registry = "deny"
unknown-git = "deny"
# Allow specific git sources if needed
allow-git = []
